name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install light deps
        run: pip install numpy pyyaml pillow ruff pytest
      - name: syntax (compileall, torch 불필요)
        run: python -m compileall -q data detect eval authclf embed infer export tests
      - name: lint (정보용, 비차단)
        run: ruff check . || true
      - name: unit tests
        run: pytest tests/ -q
